apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: targeting-service-external-secret
  namespace: toggle-master
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: targeting-service-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_USER
      remoteRef:
        key: togglemaster/targeting-db-credentials
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: togglemaster/targeting-db-credentials
        property: password
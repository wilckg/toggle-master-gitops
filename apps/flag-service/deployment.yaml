apiVersion: apps/v1
kind: Deployment
metadata:
  name: flag-service
  namespace: toggle-master
  labels:
    app: flag-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flag-service
  template:
    metadata:
      labels:
        app: flag-service
    spec:
      containers:
        - name: flag-service
          image: 539412416767.dkr.ecr.us-east-1.amazonaws.com/flag-service:3d7fe01d9f28a0e514db5895ba6902256b323076
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          env:
            - name: PORT
              value: "8002"
            - name: DATABASE_URL
              value: "postgres://$(DB_USER):$(DB_PASSWORD)@togglemaster-flag-db.c3quisgw2evv.us-east-1.rds.amazonaws.com:5432/authdb?sslmode=disable"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "flagdb"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: flag-service-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flag-service-secret
                  key: DB_PASSWORD
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8001"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
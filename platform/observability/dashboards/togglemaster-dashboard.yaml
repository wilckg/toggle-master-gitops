apiVersion: v1
kind: ConfigMap
metadata:
  name: togglemaster-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  togglemaster-dashboard.json: |
    {
      "title": "ToggleMaster - Observability",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "panels": [
        {
          "type": "timeseries",
          "title": "CPU por Pod",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"toggle-master\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 }
        },
        {
          "type": "timeseries",
          "title": "Memória por Pod",
          "targets": [
            {
              "expr": "sum(container_memory_usage_bytes{namespace=\"toggle-master\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 }
        },
        {
          "type": "logs",
          "title": "Logs em tempo real",
          "targets": [
            {
              "expr": "{namespace=\"toggle-master\"}"
            }
          ],
          "gridPos": { "x": 0, "y": 8, "w": 24, "h": 10 }
        }
      ]
    }
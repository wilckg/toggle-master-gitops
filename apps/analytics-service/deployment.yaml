apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: toggle-master
  labels:
    app: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: 539412416767.dkr.ecr.us-east-1.amazonaws.com/analytics-service:e2481ccd9b02413879d03b6e6a78f54b4745de79
          imagePullPolicy: Always
          ports:
            - containerPort: 8005
          env:
            - name: PORT
              value: "8005"
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_DYNAMODB_TABLE
              value: "ToggleMasterAnalytics"
            - name: AWS_SQS_URL
              value: "https://sqs.us-east-1.amazonaws.com/539412416767/togglemaster-queue"
            - name: OTEL_SERVICE_NAME
              value: analytics-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: toggle-master-app-of-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/wilckg/toggle-master-gitops.git
    targetRevision: main
    path: argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true